[package]
name = "duckton-settlement"
description = "Duckton — TON economic/settlement layer for the peer-to-peer DuckDB-over-QUIC query grid (stake, escrow, record anchor)"
version = "0.1.0"
license = "Apache-2.0"

[toolchain]
acton = "1.1.0"

# Sharded per-node / per-job contracts (no single global contract — TON is
# "one contract, one shard"; see BLOCKCHAIN_ECONOMICS §1).

[contracts.StakeReceiptWallet]
display-name = "StakeReceiptWallet"
src = "contracts/StakeReceiptWallet.tolk"
depends = []

[contracts.StakeVault]
display-name = "StakeVault"
src = "contracts/StakeVault.tolk"
depends = ["StakeReceiptWallet"]

[contracts.StakeVaultV2]
display-name = "StakeVaultV2"
src = "contracts/StakeVaultV2.tolk"
depends = ["StakeReceiptWallet"]

[contracts.JobEscrow]
display-name = "JobEscrow"
src = "contracts/JobEscrow.tolk"
depends = []

[contracts.RecordAnchor]
display-name = "RecordAnchor"
src = "contracts/RecordAnchor.tolk"
depends = []

[contracts.RecordAnchorV2]
display-name = "RecordAnchorV2"
src = "contracts/RecordAnchorV2.tolk"
depends = []

[contracts.GlobalParams]
display-name = "GlobalParams"
src = "contracts/GlobalParams.tolk"
depends = []

# In-place upgrade TARGETS (BLOCKCHAIN_ECONOMICS §12.1): faithful successors used
# to prove address-stable code upgradeability (TVM SETCODE). Each shares its v1's
# storage layout and adds one new getter that proves the new code is live after
# an in-place `upgrade_code` (no redeploy, address unchanged).
[contracts.GlobalParamsV2]
display-name = "GlobalParamsV2"
src = "contracts/GlobalParamsV2.tolk"
depends = []

[test]

# Coverage gate: CI fails if the overall coverage score drops below this. The
# current money-contract coverage is ~93% score / 99% lines; 90 leaves a small
# margin for benign churn while still catching real regressions.
[test.coverage]
minimum-percent = 90

# Deterministic fuzzing: a fixed seed makes @test.fuzz runs reproducible in CI.
[test.fuzz]
seed = 1337

[fmt]
width = 100
ignore = []

[scripts]
deploy-stake-emulation = "acton script scripts/deploy_stake.tolk"
deploy-stake-testnet = "acton script scripts/deploy_stake.tolk --net testnet"
deploy-anchor-emulation = "acton script scripts/deploy_anchor.tolk"
deploy-anchor-testnet = "acton script scripts/deploy_anchor.tolk --net testnet"
deploy-escrow-emulation = "acton script scripts/deploy_escrow.tolk"
deploy-escrow-testnet = "acton script scripts/deploy_escrow.tolk --net testnet"
deploy-global-params-emulation = "acton script scripts/deploy_global_params.tolk"
deploy-global-params-testnet = "acton script scripts/deploy_global_params.tolk --net testnet"
upgrade-global-params-emulation = "acton script scripts/upgrade_global_params.tolk"
upgrade-global-params-testnet = "acton script scripts/upgrade_global_params.tolk --net testnet"
e2e-emulation = "acton script scripts/e2e_testnet.tolk"
e2e-testnet = "acton script scripts/e2e_testnet.tolk --net testnet"

[import-mappings]
acton = ".acton"
contracts = "contracts"
gen = "gen"
tests = "tests"
wrappers = "wrappers"

# Check full Acton.toml reference and all available keys:
# https://ton-blockchain.github.io/acton/docs/acton-toml

# Read the Docs build config (free hosting for open source).
#
# Alternative to the GitHub Pages workflow (.github/workflows/docs.yml): import
# this repo at https://readthedocs.org (free for public repos) and RTD builds the
# MkDocs Material site on every push + gives versioned docs and PR previews. No
# secrets or CI minutes required.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: requirements-docs.txt

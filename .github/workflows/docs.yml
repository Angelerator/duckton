name: Docs

# Build the MkDocs Material site and publish it to GitHub Pages (free hosting for
# public repos). The site is rendered to the `gh-pages` branch by `mkdocs
# gh-deploy`; enable Pages once (Settings → Pages → Source: "Deploy from a
# branch" → branch `gh-pages` / root) and it serves at
# https://angelerator.github.io/duckton/.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write # gh-deploy pushes the rendered site to the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gh-deploy needs full history to update gh-pages
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 -m pip install -r requirements-docs.txt
      - name: Build (verify) the site
        run: mkdocs build --strict=false
      - name: Deploy to GitHub Pages (gh-pages branch)
        if: github.event_name != 'pull_request'
        run: mkdocs gh-deploy --force --no-history

# Live deployment running on the Azure VM (westus2, B2ls_v2) behind Caddy TLS.
#
#   console-server — live loopback grid, read-only, SSE metrics (internal :8787)
#   caddy          — auto-TLS reverse proxy: https://live.duckton.com -> console-server
#   seed           — public p2p bootstrap node (QUIC/UDP 9494), advertised at the VM IP
#
# Bring up:  cd deploy/vm && docker compose up -d --build
# (The web app is built with NEXT_PUBLIC_LIVE_URL=https://live.duckton.com.)

services:
  console-server:
    build:
      context: ../..
      dockerfile: deploy/console-server/Dockerfile
    environment:
      CONSOLE_BIND: "0.0.0.0:8787"
      CONSOLE_READONLY: "1"
      CONSOLE_ALLOWED_ORIGINS: "https://duckton.com,https://console.duckton.com"
    restart: unless-stopped
    expose: ["8787"]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - net_shared:/srv:ro
    depends_on: [console-server]

  # Public bootstrap/seed node (reachable at the VM IP on UDP 9494).
  seed:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports: ["9494:9494/udp"]
    environment:
      P2P_BIND_ADDR: "0.0.0.0:9494"
      # Externally-reachable address advertised to peers (the VM's public IP).
      P2P_ADVERTISED_ADDR: "20.57.152.157:9494"
      P2P_SHARE_DATA_CLASSES: "public"
    volumes:
      - seed_state:/node/state

  # Two more REAL host nodes (separate processes/containers) so the grid has
  # multiple independent peers and real quorum. They reuse the built seed image.
  worker-a:
    image: vm-seed
    restart: unless-stopped
    environment:
      BOOTSTRAP: "quic://seed:9494"
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_SHARE_DATA_CLASSES: "public"
    volumes:
      - worker_a_state:/node/state
    depends_on: [seed]

  worker-b:
    image: vm-seed
    restart: unless-stopped
    environment:
      BOOTSTRAP: "quic://seed:9494"
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_SHARE_DATA_CLASSES: "public"
    volumes:
      - worker_b_state:/node/state
    depends_on: [seed]

  worker-c:
    image: vm-seed
    restart: unless-stopped
    environment:
      BOOTSTRAP: "quic://seed:9494"
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_SHARE_DATA_CLASSES: "public"
    volumes:
      - worker_c_state:/node/state
    depends_on: [seed]

  worker-d:
    image: vm-seed
    restart: unless-stopped
    environment:
      BOOTSTRAP: "quic://seed:9494"
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_SHARE_DATA_CLASSES: "public"
    volumes:
      - worker_d_state:/node/state
    depends_on: [seed]

  # Requester that drives REAL distributed queries across the host nodes and
  # publishes a live JSON summary (served by Caddy at /api/network).
  collector:
    image: vm-seed
    restart: unless-stopped
    # Run as root so it can write the shared volume that Caddy serves.
    user: "0:0"
    entrypoint: ["/bin/bash", "/collector.sh"]
    volumes:
      - ./collector.sh:/collector.sh:ro
      - net_shared:/shared
    depends_on: [seed, worker-a, worker-b, worker-c, worker-d]

volumes:
  caddy_data:
  caddy_config:
  seed_state:
  worker_a_state:
  worker_b_state:
  worker_c_state:
  worker_d_state:
  net_shared:

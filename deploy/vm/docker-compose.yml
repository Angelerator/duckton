# Live deployment running on the Azure VM (westus2, B2ls_v2) behind Caddy TLS.
#
#   console-server — live loopback grid, read-only, SSE metrics (internal :8787)
#   caddy          — auto-TLS reverse proxy: https://live.duckton.com -> console-server
#   seed           — swarm bootstrap node: hosts + runs the libp2p discovery
#                    overlay (Kademlia + gossip) on tcp/9595, QUIC data plane on
#                    udp/9494. Stable overlay PeerId via a persisted key.
#   worker-a..d    — independent host nodes that bootstrap to the seed's overlay,
#                    self-advertise signed capability ads, and serve real jobs.
#   collector      — requester that discovers hosts LIVE over the overlay and
#                    drives real distributed p2p_query jobs (no static host list).
#
# Discovery is fully live: every node sets discovery.mode=kademlia and the image
# is built with the `discovery-libp2p` feature. The only configured peer address
# anywhere is the seed's DNS multiaddr (/dns4/seed/tcp/9595) — a bootstrap entry
# point, not the membership. All membership is gossiped + verified at runtime.
#
# Bring up:  cd deploy/vm && docker compose up -d --build
# (The web app is built with NEXT_PUBLIC_LIVE_URL=https://live.duckton.com.)

services:
  console-server:
    build:
      context: ../..
      dockerfile: deploy/console-server/Dockerfile
    environment:
      CONSOLE_BIND: "0.0.0.0:8787"
      CONSOLE_READONLY: "1"
      CONSOLE_ALLOWED_ORIGINS: "https://duckton.com,https://console.duckton.com"
    restart: unless-stopped
    expose: ["8787"]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - net_shared:/srv:ro
    depends_on: [console-server]

  # Swarm bootstrap/seed: hosts AND runs the discovery overlay. A persisted
  # overlay key gives it a stable PeerId across restarts (peers dial it by DNS
  # and learn the id on connect). QUIC data plane is advertised in-cluster as
  # `seed:9494` so peers can dispatch jobs to it.
  seed:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports: ["9494:9494/udp"]
    environment:
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_ADVERTISED_ADDR: "seed:9494"
      P2P_SHARE_DATA_CLASSES: "public"
      P2P_DISCOVERY_MODE: "kademlia"
      P2P_DISCOVERY_LISTEN_ADDRS: "/ip4/0.0.0.0/tcp/9595"
      P2P_DISCOVERY_KEY_PATH: "/node/state/overlay.key"
    volumes:
      - seed_state:/node/state

  # Independent host nodes. Each bootstraps to the seed's overlay multiaddr,
  # self-advertises its signed capability ad over gossip, and serves real jobs.
  worker-a:
    image: vm-seed
    restart: unless-stopped
    environment:
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_ADVERTISED_ADDR: "worker-a:9494"
      P2P_SHARE_DATA_CLASSES: "public"
      P2P_DISCOVERY_MODE: "kademlia"
      P2P_DISCOVERY_LISTEN_ADDRS: "/ip4/0.0.0.0/tcp/9595"
      P2P_DISCOVERY_BOOTSTRAP: "/dns4/seed/tcp/9595"
    volumes:
      - worker_a_state:/node/state
    depends_on: [seed]

  worker-b:
    image: vm-seed
    restart: unless-stopped
    environment:
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_ADVERTISED_ADDR: "worker-b:9494"
      P2P_SHARE_DATA_CLASSES: "public"
      P2P_DISCOVERY_MODE: "kademlia"
      P2P_DISCOVERY_LISTEN_ADDRS: "/ip4/0.0.0.0/tcp/9595"
      P2P_DISCOVERY_BOOTSTRAP: "/dns4/seed/tcp/9595"
    volumes:
      - worker_b_state:/node/state
    depends_on: [seed]

  worker-c:
    image: vm-seed
    restart: unless-stopped
    environment:
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_ADVERTISED_ADDR: "worker-c:9494"
      P2P_SHARE_DATA_CLASSES: "public"
      P2P_DISCOVERY_MODE: "kademlia"
      P2P_DISCOVERY_LISTEN_ADDRS: "/ip4/0.0.0.0/tcp/9595"
      P2P_DISCOVERY_BOOTSTRAP: "/dns4/seed/tcp/9595"
    volumes:
      - worker_c_state:/node/state
    depends_on: [seed]

  worker-d:
    image: vm-seed
    restart: unless-stopped
    environment:
      P2P_BIND_ADDR: "0.0.0.0:9494"
      P2P_ADVERTISED_ADDR: "worker-d:9494"
      P2P_SHARE_DATA_CLASSES: "public"
      P2P_DISCOVERY_MODE: "kademlia"
      P2P_DISCOVERY_LISTEN_ADDRS: "/ip4/0.0.0.0/tcp/9595"
      P2P_DISCOVERY_BOOTSTRAP: "/dns4/seed/tcp/9595"
    volumes:
      - worker_d_state:/node/state
    depends_on: [seed]

  # Requester that discovers hosts LIVE over the overlay and drives REAL
  # distributed queries across them, publishing a live JSON summary (served by
  # Caddy at /api/network). No static host list — it learns the swarm at runtime.
  collector:
    image: vm-seed
    restart: unless-stopped
    # Run as root so it can write the shared volume that Caddy serves.
    user: "0:0"
    entrypoint: ["/bin/bash", "/collector.sh"]
    environment:
      P2P_DISCOVERY_MODE: "kademlia"
      P2P_DISCOVERY_LISTEN_ADDRS: "/ip4/0.0.0.0/tcp/0"
      P2P_DISCOVERY_BOOTSTRAP: "/dns4/seed/tcp/9595"
    volumes:
      - ./collector.sh:/collector.sh:ro
      - net_shared:/shared
    depends_on: [seed, worker-a, worker-b, worker-c, worker-d]

volumes:
  caddy_data:
  caddy_config:
  seed_state:
  worker_a_state:
  worker_b_state:
  worker_c_state:
  worker_d_state:
  net_shared:

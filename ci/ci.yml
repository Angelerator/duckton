name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  ci:
    name: Rust CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain (with rustfmt + clippy)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (advisory)
        # Advisory for now: the tree carries pre-existing idiom lints
        # (field_reassign_with_default, type_complexity, …) that are not bugs.
        # `cargo build`/`fmt`/`test` are the hard gates below; ratchet this to
        # `-- -D warnings` after a dedicated lint-cleanup pass. The duckdb-engine
        # feature needs system libs absent on ubuntu-latest, so we lint the
        # workspace default features only.
        run: cargo clippy --workspace --all-targets

      - name: Run tests
        # Same rationale as Clippy: skip features that need system DuckDB.
        run: cargo test --workspace

      - name: Security audit
        uses: actions-rust-lang/audit@v1
        with:
          # Deny only unfixed vulnerabilities (advisories with no_fix = false).
          deny: warnings

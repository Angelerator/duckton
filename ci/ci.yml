name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  ci:
    name: Rust CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain (with rustfmt + clippy)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        # The duckdb-engine feature requires system libs not present on
        # ubuntu-latest by default; run against workspace default features so
        # the check is reliable without extra apt installs.
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        # Same rationale as Clippy: skip features that need system DuckDB.
        run: cargo test --workspace

      - name: Security audit
        uses: actions-rust-lang/audit@v1
        with:
          # Deny only unfixed vulnerabilities (advisories with no_fix = false).
          deny: warnings

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Pin the toolchain so every OS leg builds with the same compiler (>= the
  # workspace `rust-version` MSRV). Bump deliberately.
  RUST_TOOLCHAIN: "1.85.0"
  # Pin the DuckDB CLI used for the loadable-extension LOAD smoke test so the
  # cdylib's bundled C-API version stays compatible with the CLI it loads into.
  DUCKDB_VERSION: "v1.4.3"

jobs:
  # Cross-OS proof that the workspace builds, tests, lints, is formatted, and that
  # the loadable extension builds + LOADs on Linux, macOS, and Windows.
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Set SDKROOT (macOS)
        if: runner.os == 'macOS'
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Format check
        run: cargo fmt --all --check

      - name: Build
        run: cargo build --workspace --verbose

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace --verbose

      # --- Loadable extension: build the cdylib, append the metadata footer, and
      #     LOAD it into the duckdb CLI (proves the any-OS host surface). ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install DuckDB CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}" in
            Linux) asset=duckdb_cli-linux-amd64.zip ;;
            macOS) asset=duckdb_cli-osx-universal.zip ;;
            *) echo "unsupported OS" >&2; exit 1 ;;
          esac
          curl -fsSL -o duckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/${asset}"
          mkdir -p "$HOME/duckdb-cli"
          unzip -o duckdb.zip -d "$HOME/duckdb-cli"
          echo "$HOME/duckdb-cli" >> "$GITHUB_PATH"

      - name: Install DuckDB CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/duckdb/duckdb/releases/download/$env:DUCKDB_VERSION/duckdb_cli-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive -Path duckdb.zip -DestinationPath "$env:USERPROFILE\duckdb-cli" -Force
          "$env:USERPROFILE\duckdb-cli" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build + LOAD extension (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/build_extension.sh

      - name: Build + LOAD extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/build_extension.ps1
